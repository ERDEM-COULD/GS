<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galatasaray Sorusu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Soru: Türkiye'nin en büyük takımı hangisidir?</h1>

    <!-- Bölünmüş ekran -->
    <div id="screen">
        <div id="left-section"></div>
        <div id="right-section"></div>
    </div>

    <!-- Takım Butonları -->
    <div id="buttons">
        <button class="team-btn" data-team="FENERBAHÇE">Fenerbahçe</button>
        <button class="team-btn" data-team="BEŞİKTAŞ">Beşiktaş</button>
        <button class="team-btn" data-team="GALATASARAY">Galatasaray</button>
        <button class="team-btn" data-team="TRABZONSPOR">Trabzonspor</button>
        <button class="team-btn" data-team="AMD SPOR">AMD Spor</button>
        <button class="team-btn" data-team="SİVASSPOR">Sivasspor</button>
    </div>

    <!-- Ses Dosyaları -->
    <audio id="alkis" src="ALKIŞ SESİ.mp3"></audio>
    <audio id="zort" src="zort sesi sjsjsjsjjsjs.mp3"></audio>
    <audio id="mars" src="🎧 Saldır Galatasaray! (Galatasaray Marşı).mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
